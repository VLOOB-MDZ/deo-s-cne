<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deo's CnE — Dashboard Kasir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    [data-screen] { display: none; }
    [data-screen].active { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .order-card { animation: slideIn 0.25s ease both; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .live-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
    .status-pending    { border-left: 3px solid #d97706; }
    .status-processing { border-left: 3px solid #2563eb; }
    .status-done       { border-left: 3px solid #f59e0b; }
    .status-paid       { border-left: 3px solid #16a34a; opacity: 0.6; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1c1008; }
    ::-webkit-scrollbar-thumb { background: #4a3028; border-radius: 2px; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:  '#271310',
            'brand-mid': '#3e2723',
            'brand-light': '#6b4040',
            'brand-tint': '#fff8f6',
            surface: '#1c1008',
            'surface-2': '#2a1a10',
            'surface-3': '#3a2418',
            'on-surface': '#f2ded9',
            muted: '#8a7068',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-on-surface min-h-screen">

<!-- ═══════════════════════
     SCREEN: LOGIN
═══════════════════════ -->
<div data-screen="login" class="active">
  <div class="min-h-screen flex flex-col items-center justify-center px-6">
    <!-- Ambient glow -->
    <div class="fixed inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, rgba(107,64,64,0.25) 0%, transparent 60%)"></div>

    <div class="relative w-full max-w-sm">
      <div class="text-center mb-10">
        <h1 class="font-display text-3xl text-on-surface tracking-tight mb-1">Deo's C&amp;E</h1>
        <p class="text-muted text-sm">Dashboard Kasir</p>
      </div>

      <div class="bg-surface-2 rounded-xl p-6 space-y-5" style="border: 1px solid rgba(242,222,217,0.08);">
        <div>
          <label class="block text-xs uppercase tracking-widest text-muted mb-2">Email</label>
          <input id="login-email" type="email" placeholder="admin@deoscoffee.com"
            class="w-full bg-surface-3 text-on-surface rounded-lg px-4 py-3 text-sm placeholder:text-muted/40"
            style="border: 1px solid rgba(242,222,217,0.1);"
            onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-muted mb-2">Password</label>
          <input id="login-password" type="password" placeholder="••••••••"
            class="w-full bg-surface-3 text-on-surface rounded-lg px-4 py-3 text-sm placeholder:text-muted/40"
            style="border: 1px solid rgba(242,222,217,0.1);"
            onkeydown="if(event.key==='Enter') doLogin()"/>
        </div>
        <p id="login-error" class="text-red-400 text-xs hidden"></p>
        <button onclick="doLogin()" id="login-btn"
          class="w-full bg-on-surface text-surface font-semibold py-3 rounded-lg text-sm uppercase tracking-widest active:scale-[0.98] transition-transform duration-150">
          Masuk
        </button>
      </div>

      <p class="text-center text-xs text-muted mt-6">Hanya untuk staf Deo's Coffee &amp; Eatery</p>
    </div>
  </div>
</div>


<!-- ═══════════════════════
     SCREEN: DASHBOARD
═══════════════════════ -->
<div data-screen="dashboard">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-surface border-b" style="border-color: rgba(242,222,217,0.08);">
    <div class="flex items-center justify-between px-4 h-14 max-w-4xl mx-auto">
      <div class="flex items-center gap-3">
        <h1 class="font-display text-lg text-on-surface tracking-tight">Deo's C&amp;E</h1>
        <div class="flex items-center gap-1.5 bg-surface-2 px-2 py-1 rounded-full" style="border: 1px solid rgba(242,222,217,0.08);">
          <span class="live-dot w-1.5 h-1.5 rounded-full bg-green-400 block"></span>
          <span class="text-[10px] text-muted uppercase tracking-widest">Live</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="header-date" class="text-xs text-muted hidden sm:block"></span>
        <button onclick="doLogout()" class="flex items-center gap-1.5 text-xs text-muted hover:text-on-surface transition-colors px-2 py-1">
          <span class="material-symbols-outlined" style="font-size:16px;">logout</span>
          Keluar
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-4xl mx-auto px-4 py-4">

    <!-- Stats Strip -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-surface-2 rounded-xl p-4" style="border: 1px solid rgba(242,222,217,0.06);">
        <p class="text-[10px] uppercase tracking-widest text-muted mb-1">Pendapatan Hari Ini</p>
        <p id="stat-revenue" class="font-display text-xl text-on-surface">Rp 0</p>
      </div>
      <div class="bg-surface-2 rounded-xl p-4" style="border: 1px solid rgba(242,222,217,0.06);">
        <p class="text-[10px] uppercase tracking-widest text-muted mb-1">Pending</p>
        <p id="stat-pending" class="font-display text-xl text-amber-400">0</p>
      </div>
      <div class="bg-surface-2 rounded-xl p-4" style="border: 1px solid rgba(242,222,217,0.06);">
        <p class="text-[10px] uppercase tracking-widest text-muted mb-1">Dihidangkan</p>
        <p id="stat-done" class="font-display text-xl text-amber-400">0</p>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 mb-4 overflow-x-auto" style="-ms-overflow-style:none; scrollbar-width:none;">
      <button onclick="setFilter('all')"        id="tab-all"        class="filter-tab active-tab whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-colors">Semua</button>
      <button onclick="setFilter('pending')"   id="tab-pending"    class="filter-tab whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-colors">Pending</button>
      <button onclick="setFilter('processing')" id="tab-processing" class="filter-tab whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-colors">Diproses</button>
      <button onclick="setFilter('done')"      id="tab-done"       class="filter-tab whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-colors">Dihidangkan</button>
      <button onclick="setFilter('paid')"      id="tab-paid"       class="filter-tab whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-medium uppercase tracking-widest transition-colors">Selesai</button>
    </div>

    <!-- Orders List -->
    <div id="orders-list" class="space-y-3"></div>
    <div id="orders-empty" class="hidden text-center py-16">
      <span class="material-symbols-outlined text-muted mb-3 block" style="font-size:48px;">receipt_long</span>
      <p class="text-muted text-sm">Belum ada pesanan</p>
    </div>
    <div id="orders-loading" class="text-center py-16">
      <span class="material-symbols-outlined text-muted block mb-2" style="font-size:36px; animation: spin 1s linear infinite;">progress_activity</span>
      <p class="text-muted text-xs">Memuat pesanan...</p>
    </div>

  </div>

  <!-- Billing Footer -->
  <div class="fixed bottom-0 left-0 w-full bg-surface-2 border-t px-4 py-3" style="border-color: rgba(242,222,217,0.08);">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div>
        <p class="text-[10px] uppercase tracking-widest text-muted">Total Billing Hari Ini</p>
        <p id="billing-total" class="font-display text-lg text-on-surface">Rp 0</p>
      </div>
      <div class="text-right">
        <p class="text-[10px] uppercase tracking-widest text-muted">Order Lunas</p>
        <p id="billing-count" class="text-lg font-semibold text-green-400">0 order</p>
      </div>
    </div>
  </div>
  <div class="h-20"></div><!-- spacer for footer -->

</div><!-- /dashboard -->


<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .filter-tab { background: transparent; color: #8a7068; border: 1px solid rgba(242,222,217,0.1); }
  .filter-tab.active-tab { background: rgba(242,222,217,0.12); color: #f2ded9; border-color: rgba(242,222,217,0.2); }
</style>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyA-zqCb8PQ3sNUNb1JpWGsCIIXZN5iHa6k",
  authDomain:        "deos-cne.firebaseapp.com",
  projectId:         "deos-cne",
  storageBucket:     "deos-cne.firebasestorage.app",
  messagingSenderId: "182538534673",
  appId:             "1:182538534673:web:96f2b1974057ff700a56b0"
});
var auth = firebase.auth();
var db   = firebase.firestore();

var allOrders  = [];
var activeFilter = 'all';
var unsubscribeOrders = null;

/* ── Screen switching ── */
function showScreen(name) {
  document.querySelectorAll('[data-screen]').forEach(function(el) { el.classList.remove('active'); });
  document.querySelector('[data-screen="' + name + '"]').classList.add('active');
}

/* ── Auth state ── */
auth.onAuthStateChanged(function(user) {
  if (user) {
    showScreen('dashboard');
    updateHeaderDate();
    startOrdersListener();
  } else {
    showScreen('login');
    if (unsubscribeOrders) { unsubscribeOrders(); unsubscribeOrders = null; }
  }
});

function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass  = document.getElementById('login-password').value;
  var errEl = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');
  errEl.classList.add('hidden');
  if (!email || !pass) { errEl.textContent = 'Email dan password wajib diisi.'; errEl.classList.remove('hidden'); return; }
  btn.textContent = 'Memuat...';
  btn.disabled = true;
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(err) {
      var msg = 'Login gagal. Periksa email dan password.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = 'Email atau password salah.';
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
    })
    .finally(function() { btn.textContent = 'Masuk'; btn.disabled = false; });
}

function doLogout() {
  auth.signOut();
}

/* ── Date header ── */
function updateHeaderDate() {
  var el = document.getElementById('header-date');
  if (!el) return;
  var now = new Date();
  el.textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  el.classList.remove('hidden');
}

/* ── Real-time orders listener ── */
function startOrdersListener() {
  document.getElementById('orders-loading').style.display = 'block';

  // Listen to all orders ordered by time descending
  unsubscribeOrders = db.collection('orders')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function(snapshot) {
      allOrders = [];
      snapshot.forEach(function(doc) {
        allOrders.push(Object.assign({ id: doc.id }, doc.data()));
      });
      document.getElementById('orders-loading').style.display = 'none';
      updateStats();
      renderOrders();
    }, function(err) {
      console.error(err);
      document.getElementById('orders-loading').style.display = 'none';
    });
}

/* ── Stats ── */
function updateStats() {
  var today = new Date();
  today.setHours(0, 0, 0, 0);

  var todayOrders = allOrders.filter(function(o) {
    if (!o.createdAt) return false;
    var d = o.createdAt.toDate ? o.createdAt.toDate() : new Date(o.createdAt);
    return d >= today;
  });

  var revenue = todayOrders.filter(function(o) { return o.status === 'paid'; })
    .reduce(function(s, o) { return s + (o.total || 0); }, 0);
  var pending    = todayOrders.filter(function(o) { return o.status === 'pending'; }).length;
  var processing = todayOrders.filter(function(o) { return o.status === 'processing'; }).length;
  var done       = todayOrders.filter(function(o) { return o.status === 'done'; }).length;
  var paid       = todayOrders.filter(function(o) { return o.status === 'paid'; }).length;

  document.getElementById('stat-revenue').textContent  = formatRp(revenue);
  document.getElementById('stat-pending').textContent  = pending + processing;
  document.getElementById('stat-done').textContent     = done;
  document.getElementById('billing-total').textContent = formatRp(revenue);
  document.getElementById('billing-count').textContent = paid + ' order';
}

/* ── Filter tabs ── */
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active-tab'); });
  document.getElementById('tab-' + f).classList.add('active-tab');
  renderOrders();
}

/* ── Render orders ── */
function renderOrders() {
  var list    = document.getElementById('orders-list');
  var empty   = document.getElementById('orders-empty');

  var filtered;
  if (activeFilter === 'all') {
    var active = allOrders.filter(function(o) { return o.status !== 'paid'; });
    var paid   = allOrders.filter(function(o) { return o.status === 'paid'; });
    filtered   = active.concat(paid);
  } else {
    filtered = allOrders.filter(function(o) { return o.status === activeFilter; });
  }

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = filtered.map(function(order) {
    var timeStr = '—';
    if (order.createdAt && order.createdAt.toDate) {
      timeStr = order.createdAt.toDate().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }
    var statusLabel = { pending: 'Menunggu', processing: 'Diproses', done: 'Dihidangkan', paid: 'Selesai' }[order.status] || order.status;
    var statusColor = { pending: 'text-amber-400', processing: 'text-blue-400', done: 'text-yellow-300', paid: 'text-green-400' }[order.status] || 'text-muted';
    var items       = order.items || [];
    var allServed   = items.length > 0 && items.every(function(i) { return i.served; });
    var unservedCnt = items.filter(function(i) { return !i.served; }).length;

    var itemsHtml = items.map(function(i) {
      var servedBadge = i.served
        ? '<span class="text-[10px] ml-2" style="color:rgba(74,222,128,0.65);">✓ Dihidangkan</span>'
        : (order.status !== 'paid'
            ? '<button class="serve-item-btn text-[10px] px-2 py-0.5 rounded-md ml-2 transition-colors" style="background:rgba(251,191,36,0.1);color:rgba(251,191,36,0.8);border:1px solid rgba(251,191,36,0.2);" data-order="' + order.id + '" data-item="' + escHtml(i.name) + '">Hidangkan</button>'
            : '');
      var nameStyle = i.served ? 'opacity-35' : '';
      var row = '<div class="mb-2">'
        + '<div class="flex items-center flex-wrap">'
        + '<span class="text-xs text-muted ' + nameStyle + '">' + i.qty + 'x ' + escHtml(i.name) + '</span>'
        + servedBadge
        + '</div>';
      if (i.notes) {
        row += '<div class="mt-0.5"><span class="text-[11px]" style="color:rgba(251,191,36,0.75);">📝 ' + escHtml(i.notes) + '</span></div>';
      } else {
        row += '<div class="mt-0.5"><span class="text-[11px]" style="color:rgba(242,222,217,0.18);">— tidak ada catatan</span></div>';
      }
      return row + '</div>';
    }).join('');

    var typeLabel = order.orderType === 'dine-in'
      ? '<span class="bg-surface-3 text-on-surface/70 px-2 py-0.5 rounded text-[10px] uppercase tracking-widest">' + (order.tableNumber || 'Dine-in') + '</span>'
      : '<span class="bg-surface-3 text-on-surface/70 px-2 py-0.5 rounded text-[10px] uppercase tracking-widest">Takeaway</span>';

    var actionBtns = '';
    if (order.status === 'paid') {
      actionBtns = '<span class="text-green-400/60 text-xs flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:\'FILL\' 1;">check_circle</span>Lunas</span>';
    } else {
      if (order.status === 'pending') {
        actionBtns += '<button onclick="updateStatus(\'' + order.id + '\',\'processing\')" class="action-btn bg-blue-600/20 text-blue-300 hover:bg-blue-600/40 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">Proses</button>';
      }
      if (unservedCnt > 1) {
        actionBtns += '<button class="serve-all-btn action-btn bg-yellow-600/20 text-yellow-300 hover:bg-yellow-600/40 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" data-order="' + order.id + '">Semua Dihidangkan</button>';
      }
      if (allServed || order.status === 'done') {
        actionBtns += '<button onclick="updateStatus(\'' + order.id + '\',\'paid\')" class="action-btn bg-green-600/20 text-green-300 hover:bg-green-600/40 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">Tandai Lunas</button>';
      }
    }


    return '<div class="order-card bg-surface-2 rounded-xl p-4 status-' + order.status + '" style="border: 1px solid rgba(242,222,217,0.06);">'
      + '<div class="flex items-start justify-between mb-3">'
      +   '<div class="flex items-center gap-2 flex-wrap">'
      +     '<span class="font-mono text-xs text-muted">#' + order.id.slice(-6).toUpperCase() + '</span>'
      +     typeLabel
      +   '</div>'
      +   '<span class="text-xs text-muted shrink-0 ml-2">' + timeStr + '</span>'
      + '</div>'
      + '<div class="flex items-baseline gap-2 mb-2">'
      +   '<h3 class="font-semibold text-on-surface">' + escHtml(order.customerName || '—') + '</h3>'
      +   '<span class="text-xs ' + statusColor + '">' + statusLabel + '</span>'
      + '</div>'
      + '<div class="leading-relaxed mb-1">' + itemsHtml + '</div>'
      + '<div class="flex items-center justify-between mt-3 pt-3" style="border-top: 1px solid rgba(242,222,217,0.07);">'
      +   '<span class="font-semibold text-on-surface text-sm">' + formatRp(order.total || 0) + '</span>'
      +   '<div class="flex gap-2">' + actionBtns + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

/* ── Update order status ── */
function updateStatus(orderId, newStatus) {
  db.collection('orders').doc(orderId).update({ status: newStatus })
    .catch(function(err) { console.error(err); alert('Gagal update status.'); });
}

/* ── Mark single item as served ── */
function markItemServed(orderId, itemName) {
  db.collection('orders').doc(orderId).get().then(function(doc) {
    if (!doc.exists) return;
    var data  = doc.data();
    var items = (data.items || []).map(function(item) {
      return item.name === itemName ? Object.assign({}, item, { served: true }) : item;
    });
    var allServed = items.every(function(item) { return item.served; });
    return db.collection('orders').doc(orderId).update({
      items:  items,
      status: allServed ? 'done' : data.status
    });
  }).catch(function(err) { console.error(err); });
}

/* ── Mark all items as served ── */
function markAllServed(orderId) {
  db.collection('orders').doc(orderId).get().then(function(doc) {
    if (!doc.exists) return;
    var items = (doc.data().items || []).map(function(item) {
      return Object.assign({}, item, { served: true });
    });
    return db.collection('orders').doc(orderId).update({ items: items, status: 'done' });
  }).catch(function(err) { console.error(err); });
}

/* ── Event delegation for per-item buttons (rendered dynamically) ── */
document.addEventListener('click', function(e) {
  var serveBtn = e.target.closest('.serve-item-btn');
  if (serveBtn) { markItemServed(serveBtn.dataset.order, serveBtn.dataset.item); return; }
  var allBtn = e.target.closest('.serve-all-btn');
  if (allBtn) { markAllServed(allBtn.dataset.order); }
});

/* ── Helpers ── */
function formatRp(amount) {
  return 'Rp ' + amount.toLocaleString('id-ID');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
